name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Unit-тесты и сборка Android
    runs-on: ubuntu-latest

    steps:
      - name: Забрать исходники
        uses: actions/checkout@v5

      - name: Настроить JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Дать gradlew право на запуск
        run: chmod +x ./gradlew

      - name: Показать версии Gradle и Java
        run: ./gradlew --version --no-daemon

      - name: Запустить unit-тесты
        run: ./gradlew testDebugUnitTest --no-daemon --console=plain

      - name: Собрать debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Собрать инструментальные тесты
        run: ./gradlew assembleDebugAndroidTest --no-daemon --console=plain

      - name: Загрузить отчёты unit-тестов
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest
          if-no-files-found: ignore

      - name: Загрузить debug APK
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error